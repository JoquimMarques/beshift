<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Beshift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: none;" id="dashboardBody"> <!-- Hidden until auth is checked -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="logo">beshift</div>
        <div class="nav-links">
            <span id="userEmailDisplay" style="color: var(--text-muted); margin-right: 1rem; font-size: 0.9rem;"></span>
            <button id="logoutBtn">Sair</button>
        </div>
    </header>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <h1>Painel de Links</h1>
            <p style="color: var(--text-muted);">Crie novos links curtos e acompanhe o desempenho deles.</p>
        </div>

        <div class="glass-panel">
            <form id="shortenForm" class="shortener-box">
                <div class="input-group">
                    <label for="originalUrl">URL de Destino</label>
                    <input type="url" id="originalUrl" required placeholder="https://exemplo.com/caminho-muito-longo-da-url">
                </div>
                <div class="input-group" style="flex: 0.5;">
                    <label for="customAlias">Apelido (Opcional)</label>
                    <input type="text" id="customAlias" placeholder="minha-campanha">
                </div>
                <button type="submit" class="btn-primary" id="shortenBtn">Encurtar</button>
            </form>

            <div class="stats-container">
                <h2>Seus Links</h2>
                <div class="stats-table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>URL Curta</th>
                                <th>URL Original</th>
                                <th>Visualizações</th>
                                <th>Criado em</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="linksTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem;">Carregando seus links...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="notification"></div>

    <!-- Modal de Estatísticas -->
    <div id="statsModal" class="modal hidden">
        <div class="modal-content glass-panel" style="padding: 2rem;">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Visualizações Detalhadas</h2>
            <div id="modalLoading" style="text-align: center; padding: 2rem;">
                <span class="loading"></span>
            </div>
            <div id="modalData" class="hidden">
                <div class="stats-table-wrapper" style="max-height: 400px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Data e Hora</th>
                                <th>País</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
