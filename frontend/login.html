<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Login - Beshift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">beshift</div>
    </header>

    <main class="login-container">
        <div class="glass-panel login-box">
            <h1>Login Administrativo</h1>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Endereço de Email</label>
                    <input type="email" id="email" required placeholder="admin@beshift.com">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">
                    Entrar
                </button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Se você não possui uma conta, crie a sua através do Console do Firebase.
            </p>
        </div>
    </main>

    <div id="notification"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
